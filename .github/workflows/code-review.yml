# =============================================================
# GitHub Actions Workflow: AI Code Review
# =============================================================
# Performs AI-powered code review on pull requests using
# GitHub Copilot CLI automation.
#
# Inspired by: neildcruz/copilot-cli-automation-accelerator
# =============================================================

name: AI Code Review

on:
  pull_request:
    branches: [main, develop]

  workflow_dispatch:
    inputs:
      custom_prompt:
        description: 'Optional custom review instructions'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd sample-app && npm install && cd ..

      - name: Install GitHub Copilot CLI
        run: |
          gh extension install github/gh-copilot || true
          gh extension upgrade github/gh-copilot || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Code Review Agent
        id: review
        run: |
          REVIEW_PROMPT="Review the code changes in this repository.

          Please analyze:
          1. The overall code structure and organization
          2. Any potential bugs or issues
          3. Performance optimizations that could be made
          4. Code style and best practices
          5. Error handling patterns

          Provide a summary with actionable recommendations.

          ${{ github.event.inputs.custom_prompt }}"

          echo "## 📝 AI Code Review Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.head_ref || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Reviewer:** GitHub Copilot Code Review Agent" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Review Prompt" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$REVIEW_PROMPT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Findings" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The code review agent would analyze the PR diff and produce findings here." >> $GITHUB_STEP_SUMMARY
          echo "In a live environment, this step invokes \`gh copilot\` with the above prompt." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Review completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")*" >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Review Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-review-report
          path: samples/findings/
          retention-days: 30
